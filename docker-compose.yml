services:
  db:
    image: postgres:17
    container_name: tiltmeter_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tiltmeter_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
          condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  